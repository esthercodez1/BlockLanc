# chainhook-config.toml - BlockLancer Chainhook configuration
# Updated for v2 contracts deployed on testnet

[storage]
working_dir = "cache"

[network]
mode = "testnet"
bitcoind_rpc_url = "http://localhost:18443"
bitcoind_rpc_username = "devnet"
bitcoind_rpc_password = "devnet"
stacks_node_rpc_url = "https://api.testnet.hiro.so"

[http_api]
http_port = 20456
database_uri = "redis://localhost:6379/"

# ===== BLOCKLANCER ESCROW EVENTS =====
[[predicates]]
uuid = "blocklancer-escrow-events"
name = "BlockLancer Escrow Events"
network = "testnet"
version = 2
start_block = 1

[predicates.predicate]
scope = "contract_call"
contract_identifier = "ST30M31FNAKNX5EJKV10V7SJSE07VVDFFZHZHGE0J.blocklancer-escrow-v2"
method = ["create-escrow", "add-milestone", "submit-milestone", "approve-milestone", "reject-milestone"]

[predicates.action]
http_post_url = "http://localhost:8080/webhooks/escrow"
http_post_authorization_header = "Bearer ${CHAINHOOK_AUTH_TOKEN}"

